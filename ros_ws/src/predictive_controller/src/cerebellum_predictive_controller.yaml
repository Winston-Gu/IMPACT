cerebellum_predictive_controller:
  joints:
    type: string_array
    description: "Names of the joints"

  end_effector_frame:
    type: string
    description: "Name of the end-effector frame"

  base_frame:
    type: string
    default_value: ""
    description: "Name of the end-effector frame"

  use_operational_space:
    type: bool
    default_value: False
    description: "Whether we use operational space control or cartesian impedance control"

  task:
    k_pos_x:
      type: double
      default_value: 500.0
      description: "Stiffness in the x direction for the translation"
      validation:
        bounds<>: [0.0, 5000.0]
    d_pos_x:
      type: double
      default_value: -1.0
      description: "Damping in the x direction for the translation. If negative, computed as 2*sqrt(stiffness)"
      validation:
        bounds<>: [-1.0, 5000.0]
    k_pos_y:
      type: double
      default_value: 500.0
      description: "Stiffness in the y direction for the translation"
      validation:
        bounds<>: [0.0, 5000.0]
    d_pos_y:
      type: double
      default_value: -1.0
      description: "Damping in the y direction for the translation. If negative, computed as 2*sqrt(stiffness)"
      validation:
        bounds<>: [-1.0, 5000.0]
    k_pos_z:
      type: double
      default_value: 500.0
      description: "Stiffness in the z direction for the translation"
      validation:
        bounds<>: [0.0, 5000.0]
    d_pos_z:
      type: double
      default_value: -1.0
      description: "Damping in the z direction for the translation. If negative, computed as 2*sqrt(stiffness)"
      validation:
        bounds<>: [-1.0, 5000.0]
    k_rot_x:
      type: double
      default_value: 30.0
      description: "Stiffness in the x direction for the orientation"
      validation:
        bounds<>: [0.0, 5000.0]
    d_rot_x:
      type: double
      default_value: -1.0
      description: "Damping in the x direction for the orientation. If negative, computed as 2*sqrt(stiffness)"
      validation:
        bounds<>: [-1.0, 5000.0]
    k_rot_y:
      type: double
      default_value: 30.0
      description: "Stiffness in the y direction for the orientation"
      validation:
        bounds<>: [0.0, 5000.0]
    d_rot_y:
      type: double
      default_value: -1.0
      description: "Damping in the y direction for the orientation. If negative, computed as 2*sqrt(stiffness)"
      validation:
        bounds<>: [-1.0, 5000.0]
    k_rot_z:
      type: double
      default_value: 30.0
      description: "Stiffness in the z direction for the orientation"
      validation:
        bounds<>: [0.0, 5000.0]
    d_rot_z:
      type: double
      default_value: -1.0
      description: "Damping in the z direction for the orientation. If negative, computed as 2*sqrt(stiffness)"
      validation:
        bounds<>: [-1.0, 5000.0]
    error_clip:
      x:
        type: double
        description: "Max allowed error in x direction."
        default_value: 0.1
      y:
        type: double
        description: "Max allowed error in y direction."
        default_value: 0.1
      z:
        type: double
        description: "Max allowed error in z direction."
        default_value: 0.1
      rx:
        type: double
        description: "Max allowed error in the rotational x direction (local or global frame)."
        default_value: 0.5
      ry:
        type: double
        description: "Max allowed error in the rotational y direction (local or global frame)."
        default_value: 0.5
      rz:
        type: double
        description: "Max allowed error in the rotational z direction (local or global frame)."
        default_value: 0.5

  nullspace:
    stiffness:
      type: double
      default_value: 1.0
      description: "Stiffness of the nullspace controller."
      validation:
        bounds<>: [0.0, 500.0]
    damping:
      type: double
      default_value: -1.0
      description: "Damping of the nullspace controller. If negative, then 2 sqrt(stiffness) is used."
      validation:
        bounds<>: [-1.0, 500.0]
    weights:
      __map_joints:
        value:
          type: double
          default_value: 1.0
          description: "Weights for each joint for the nullspace parameters."
          validation:
            bounds<>: [0.0, 500.0]
    regularization:
      type: double
      default_value: 0.000001
      description: "Regularization value for the pseudo-inverse."
      validation:
        bounds<>: [0.000001, 0.0001]
    projector_type:
      type: string
      default_value: "kinematic"
      description: "Which type of nullspace projector should be used: kinematic, dynamic or none."
      validation:
        one_of<>: [["kinematic", "dynamic", "none"]]
    max_tau:
      type: double
      default_value: 5
      description: "Maximal torque value that can be applied in the nullspace. This is used to be sure that we do not interfere with the main task."

  noise:
    add_random_noise:
      type: bool
      default_value: false
      description: "Whether or not we add random noise to the torques. This is just to test for stability."
    amplitude:
      type: double
      default_value: 0.0
      description: "Magnitude of the added noise, if added."
      validation:
        bounds<>: [0.0, 10.0]

  use_friction:
    type: bool
    default_value: false
    description: "Use friction compensation"

  use_coriolis_compensation:
    type: bool
    default_value: false
    description: "Use coriolis compensation"

  use_gravity_compensation:
    type: bool
    default_value: false
    description: "Add use_gravity_compensation. Double check that your robot is not already doing this behind the scenes (which is the case for Franka Robotics). In this case you should leave this parameter to false!"

  use_local_jacobian:
    type: bool
    default_value: false
    description: "If true, we use the local jacobian for computations, otherwise we use the world jacobian."

  use_external_wrench_observer:
    type: bool
    default_value: true
    description: "Enable the residual-based external wrench observer."

  observer_lambda:
    type: double
    default_value: 0.001
    description: "Damping factor for the residual wrench estimation (damped least squares)."
    validation:
      bounds<>: [0.0, 0.1]

  observer_lpf_alpha:
    type: double
    default_value: 0.05
    description: "Low-pass filter alpha for the estimated wrench (0..1)."
    validation:
      bounds<>: [0.0, 1.0]

  observer_ddq_alpha:
    type: double
    default_value: 0.2
    description: "Low-pass filter alpha for joint acceleration estimate (0..1)."
    validation:
      bounds<>: [0.0, 1.0]

  observer_max_force:
    type: double
    default_value: 80.0
    description: "Clamp the norm of the estimated force (N)."
    validation:
      bounds<>: [0.0, 500.0]

  observer_max_torque:
    type: double
    default_value: 15.0
    description: "Clamp the norm of the estimated torque (Nm)."
    validation:
      bounds<>: [0.0, 200.0]

  observer_min_speed_for_update:
    type: double
    default_value: 0.01
    description: "Skip updates if joint speed norm is below this threshold (rad/s)."
    validation:
      bounds<>: [0.0, 5.0]

  observer_warmup_cycles:
    type: int
    default_value: 100
    description: "Number of initial cycles to ignore for observer output."
    validation:
      bounds<>: [0, 10000]

  observer_use_gravity:
    type: bool
    default_value: true
    description: "Use gravity term in the observer model."

  observer_use_coriolis:
    type: bool
    default_value: true
    description: "Use coriolis term in the observer model."

  observer_use_mass_ddq:
    type: bool
    default_value: false
    description: "Use mass*ddq term in the observer model."

  observer_use_friction:
    type: bool
    default_value: true
    description: "Use friction term in the observer model."

  cereb_bias_enable:
    type: bool
    default_value: false
    description: "Enable slow/fast wrench decomposition."

  cereb_bias_alpha_force:
    type: double
    default_value: 0.0
    description: "Bias-state update gain for force axes."
    validation:
      bounds<>: [0.0, 10.0]

  cereb_bias_alpha_torque:
    type: double
    default_value: 0.0
    description: "Bias-state update gain for torque axes."
    validation:
      bounds<>: [0.0, 10.0]

  cereb_bias_huber_force:
    type: double
    default_value: 0.0
    description: "Innovation clip threshold for force axes (N)."
    validation:
      bounds<>: [0.0, 100.0]

  cereb_bias_huber_torque:
    type: double
    default_value: 0.0
    description: "Innovation clip threshold for torque axes (Nm)."
    validation:
      bounds<>: [0.0, 100.0]

  cereb_bias_leak:
    type: double
    default_value: 0.0
    description: "Leak rate for slow wrench (1/s)."
    validation:
      bounds<>: [0.0, 100.0]

  cereb_bias_max_force:
    type: double
    default_value: 0.0
    description: "Clamp norm of slow force component (N)."
    validation:
      bounds<>: [0.0, 200.0]

  cereb_bias_max_torque:
    type: double
    default_value: 0.0
    description: "Clamp norm of slow torque component (Nm)."
    validation:
      bounds<>: [0.0, 200.0]

  cereb_model_enable:
    type: bool
    default_value: false
    description: "Enable linear SGD model for slow wrench prediction."

  cereb_weight_model_enable:
    type: bool
    default_value: false
    description: "Enable scalar weight model for payload prediction."

  cereb_weight_learning_rate:
    type: double
    default_value: 0.01
    description: "Learning rate for scalar weight model."
    validation:
      bounds<>: [0.0, 1.0]

  cereb_weight_min_force:
    type: double
    default_value: 1.0
    description: "Minimum |fz| (N) to consider payload present for updates."
    validation:
      bounds<>: [0.0, 100.0]

  cereb_weight_hold_on_force:
    type: double
    default_value: 2.0
    description: "Hold detection threshold (N) to latch payload on."
    validation:
      bounds<>: [0.0, 100.0]

  cereb_weight_hold_off_force:
    type: double
    default_value: 1.0
    description: "Release detection threshold (N) to latch payload off."
    validation:
      bounds<>: [0.0, 100.0]

  cereb_weight_ff_holdoff_sec:
    type: double
    default_value: 0.5
    description: "Holdoff duration after hold start before applying weight feedforward (s)."
    validation:
      bounds<>: [0.0, 10.0]

  cereb_weight_reset_ratio:
    type: double
    default_value: 0.8
    description: "Reset weight estimate if measured weight is below this ratio of estimate."
    validation:
      bounds<>: [0.0, 1.0]

  cereb_weight_surprise_threshold:
    type: double
    default_value: 5.0
    description: "Minimum surprise (N) to update payload estimate."
    validation:
      bounds<>: [0.0, 100.0]

  cereb_surprise_lpf_alpha:
    type: double
    default_value: 0.01
    description: "Low-pass filter alpha for surprise gating."
    validation:
      bounds<>: [0.0, 1.0]

  cereb_gripper_holdoff_enable:
    type: bool
    default_value: true
    description: "Force hold-off when a gripper open command is received."

  cereb_gripper_holdoff_threshold:
    type: double
    default_value: 0.1
    description: "Gripper command threshold (normalized) to force hold-off."
    validation:
      bounds<>: [0.0, 1.0]

  cereb_gripper_command_topic:
    type: string
    default_value: "/gripper/gripper_position_controller/commands"
    description: "Gripper command topic for hold-off detection."

  cereb_weight_max_force:
    type: double
    default_value: 100.0
    description: "Maximum payload force (N) clamp for weight estimate."
    validation:
      bounds<>: [0.0, 500.0]

  cereb_readings_noisy:
    type: bool
    default_value: true
    description: "Use weight estimate for feedforward when readings are noisy; if false, use slow wrench z."

  cereb_sgd_learning_rate:
    type: double
    default_value: 0.001
    description: "SGD learning rate for slow-wrench model."
    validation:
      bounds<>: [0.0, 1.0]

  cereb_sgd_slow_rate_threshold:
    type: double
    default_value: 2.0
    description: "Max norm of slow-wrench rate (per second) to allow SGD updates."
    validation:
      bounds<>: [0.0, 100.0]
  log:
    enabled:
      type: bool
      default_value: false
      description: "If set so to true, log some debugging statements."
    robot_state:
      type: bool
      default_value: false
      description: "If set so to true, log the robot state like the joint state and end effector position."
    control_values:
      type: bool
      default_value: false
      description: "If set so to true, log the control values like error to target."
    limits:
      type: bool
      default_value: false
      description: "If set so to true, log the limits of each joint."
    controller_parameters:
      type: bool
      default_value: false
      description: "If set so to true, log the controller parameters like the stiffness, damping..."
    computed_torques:
      type: bool
      default_value: false
      description: "If set so to true, log the individual computed torques."
    dynamic_params:
      type: bool
      default_value: false
      description: "If set so to true, log the dynamic_params like the mass matrix, operational mass matrix..."
    timing:
      type: bool
      default_value: false
      description: "If true, the time required by the loop will be displayed."

  filter:
    target_pose:
      type: double
      default_value: 0.1
      description: "Amount of smoothing for the target pose when using the EMA. The EMA is applied at each step"
      validation:
        bounds<>: [0.1, 1.0]
    q:
      type: double
      default_value: 1.0
      description: "Amount of smoothing for the target pose when using the EMA."
      validation:
        bounds<>: [0.0, 1.0]
    dq:
      type: double
      default_value: 1.0
      description: "Amount of smoothing for the target pose when using the EMA."
      validation:
        bounds<>: [0.0, 1.0]

    output_torque:
      type: double
      default_value: 1.0
      description: "Amount of smoothing for the output torque when using the EMA."
      validation:
        bounds<>: [0.0, 1.0]

  limit_error:
    type: bool
    default_value: true
    description: "Limit\\clamp the error computed as the difference between the current pose and target pose."

  limit_torques:
    type: bool
    default_value: true
    description: "Limit torques"

  max_delta_tau:
    type: double
    default_value: 0.5
    description: "Max allowed change in torque per joint per control loop."

  stop_commands:
    type: bool
    default_value: False
    description: "If set to true, we will stop sending commands to the robot. This is mainly for debugging useful."

  friction:
    fp1:
      type: double_array
      default_value: [0.54615, 0.87224, 0.64068, 1.2794, 0.83904, 0.30301, 0.56489]
      description: "Friction parameters part 1"
    fp2:
      type: double_array
      default_value: [ 5.1181, 9.0657, 10.136, 5.5903, 8.3469, 17.133, 10.336]
      description: "Friction parameters part 2"
    fp3:
      type: double_array
      default_value: [ 0.039533, 0.025882, -0.04607, 0.036194, 0.026226, -0.021047, 0.0035526]
      description: "Friction parameters part 3"
