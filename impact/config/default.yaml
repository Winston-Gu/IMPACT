defaults:
  - _self_
  - dataset: dataset
  - dataloader: data_loader
  - logging: logging
  - normalizer: normalizer

_target_: impact.workspace.real_world_workspace.RealWorldWorkspace

project_root: ${hydra:runtime.cwd}
experiment_name: DEBUG

key_parameters:
  horizon: 32
  n_obs_steps: 2
  n_action_steps: 16
  n_latency_steps: 0
  resize_image_hw: [128, 128]
  seed: 42

shape_meta:
  obs:
    front_camera:
      shape: [3, 128, 128]
      type: rgb
    side_camera:
      shape: [3, 128, 128]
      type: rgb
    proprioception:
      shape: [15]
      type: low_dim
  action:
    shape: [8]

runner:
  _target_: impact.runner.offline_runner.OfflineImageRunner
  output_dir: ${hydra:run.dir}

hydra:
  run:
    dir: ${project_root}/logs/${experiment_name}/${now:%m%d%H%M%S}

policy:
  _target_: impact.policy.diffusion_unet_image_policy.DiffusionUnetImagePolicy
  shape_meta: ${shape_meta}

  noise_scheduler:
    _target_: diffusers.schedulers.scheduling_ddim.DDIMScheduler
    num_train_timesteps: 100
    beta_start: 0.0001
    beta_end: 0.02
    beta_schedule: squaredcos_cap_v2
    # variance_type: fixed_small
    # clip_sample: true
    # prediction_type: epsilon
    clip_sample: True
    set_alpha_to_one: True
    steps_offset: 0
    prediction_type: epsilon # or sample

  obs_encoder:
    _target_: impact.model.vision.multi_image_obs_encoder.MultiImageObsEncoder
    shape_meta: ${shape_meta}
    # rgb_model:
    #   _target_: impact.model.vision.model_getter.get_resnet
    #   name: resnet18
    #   weights: null
    rgb_model:
      _target_: impact.model.vision.plain_encoder.PlainConv
      in_channels: 3
      out_dim: 256 # Resnet 18 output dim is 512.
      pool_feature_map: true
      last_act: true
    resize_shape: [128, 128]
    random_crop: false
    use_group_norm: true
    share_rgb_model: false
    imagenet_norm: false

  horizon: ${key_parameters.horizon}
  n_action_steps: ${key_parameters.n_action_steps}
  n_obs_steps: ${key_parameters.n_obs_steps}
  num_inference_steps: 10
  obs_as_global_cond: true
  diffusion_step_embed_dim: 64
  down_dims: [64, 128, 256]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: true

ema:
  _target_: impact.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.999

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: cuda:0
  seed: ${key_parameters.seed}
  resume: false
  debug: false
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 400
  gradient_accumulate_every: 1
  use_ema: true
  freeze_encoder: false
  rollout_every: 20
  checkpoint_every: 20
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

checkpoint:
  save_last_ckpt: true
  save_last_snapshot: false
  save_all_ckpt: true
  all_format_str: "epoch={epoch:03d}.ckpt"
